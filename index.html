  <style>
    :root {
      color-scheme: dark;
      --bg:     #0a0a0a;
      --panel:  #111111;
      --fg:     #e8e8e8;
      --dim:    #6a6a6a;
      --dim2:   #3a3a3a;
      --line:   #1a1a1a;
      --line2:  #262626;
      --accent: #00ff88;
      --blue:   #4ea1ff;
      --mauve:  #c792ea;
      --yellow: #f5d76e;
      --red:    #ff6b6b;
      --mono:   'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
      font-family: var(--mono); font-size: 14px; line-height: 1.55;
      -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
      overscroll-behavior: contain; overflow: hidden; }

    @media (min-width: 720px) and (prefers-reduced-motion: no-preference) {
      body::after {
        content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 60;
        background: repeating-linear-gradient(to bottom, rgba(255,255,255,0) 0, rgba(255,255,255,0) 2px,
          rgba(255,255,255,0.012) 3px, rgba(255,255,255,0) 4px);
      }
    }

    a { color: var(--blue); text-decoration: none; border-bottom: 1px dotted var(--dim2);
        transition: color .12s, border-color .12s; cursor: pointer; }
    a:hover, a:focus-visible { color: var(--accent); border-color: var(--accent); }
    :focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; border-radius: 1px; }

    /* tmux window chrome */
    main {
      display: flex; flex-direction: column;
      width: 100%; height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }

    .window {
      flex: 1; display: flex; flex-direction: column;
      background: var(--panel); border: 1px solid var(--line);
      box-shadow: 0 0 60px rgba(0,0,0,.6) inset;
      overflow: hidden; min-height: 0;
    }
    .titlebar {
      display: flex; align-items: center; gap: .5rem;
      padding: .55rem 1rem; background: #161616;
      border-bottom: 1px solid var(--line);
      font-size: 12px; color: var(--dim); flex: 0 0 auto;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }
    .titlebar__name { margin-left: .5rem; }

    /* pane container — flexbox row, scroll on x */
    .panes {
      flex: 1; display: flex; flex-direction: row;
      overflow-x: auto; overflow-y: hidden;
      scroll-behavior: smooth;
      min-height: 0;
    }
    .panes::-webkit-scrollbar { height: 6px; }
    .panes::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 3px; }

    .pane {
      flex: 0 0 min(640px, 100%);
      display: flex; flex-direction: column;
      border-right: 1px solid var(--line);
      min-width: 0;
      animation: splitIn .22s ease-out;
      background: var(--panel);
    }
    .pane:last-child { border-right: none; }
    .pane.active { background: #131313; }
    /* Single-pane mode: fill the whole window. As soon as a 2nd pane opens,
       the `.panes.split` class kicks in and panes snap to fixed widths. */
    .panes:not(.split) .pane { flex: 1 1 100%; }
    @keyframes splitIn {
      from { opacity: 0; flex-basis: 0; }
      to   { opacity: 1; flex-basis: min(640px, 100%); }
    }

    .pane__bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .35rem .8rem; background: #0e0e0e;
      border-bottom: 1px solid var(--line); flex: 0 0 auto;
      font-size: 11.5px; color: var(--dim);
    }
    .pane.active .pane__bar { background: #1a1a1a; color: var(--fg); }
    .pane__id { color: var(--dim2); margin-right: .5rem; }
    .pane.active .pane__id { color: var(--accent); }
    .pane__path { color: var(--blue); }
    .pane__close {
      cursor: pointer; padding: 0 .5rem; border-radius: 2px;
      color: var(--dim2); transition: all .12s;
      border-bottom: 0;
    }
    .pane__close:hover { color: var(--red); background: #2a1515; }

    .pane__body {
      flex: 1; min-height: 0;
      padding: 1rem clamp(.9rem, 3vw, 1.6rem) 1.5rem;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      font-size: 13.5px;
    }
    .pane__body::-webkit-scrollbar { width: 6px; }
    .pane__body::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 3px; }

    /* tmux status bar */
    .statusbar {
      flex: 0 0 auto; height: 24px;
      background: #000; border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 .8rem; font-size: 11px; color: var(--dim);
    }
    .tabs { display: flex; gap: 1px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 2px 9px; cursor: pointer; color: var(--dim);
      border-bottom: 0; white-space: nowrap;
      transition: all .12s;
    }
    .tab:hover { color: var(--fg); background: #161616; }
    .tab.active { background: #1f2937; color: #93c5fd; }
    .tab .i { color: var(--dim2); margin-right: 5px; }
    .tab.active .i { color: #60a5fa; }
    .status-right { display: flex; gap: 12px; align-items: center; }
    .status-right .sep { color: var(--dim2); }
    .blink { animation: blink 1.1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* shell content */
    .line { margin: 0 0 .15rem; word-break: break-word; }
    .ps1 { color: var(--dim); white-space: nowrap; }
    .ps1 .u { color: var(--accent); }
    .ps1 .a { color: var(--dim); }
    .ps1 .h { color: var(--blue); }
    .ps1 .c { color: var(--mauve); }
    .ps1 .d { color: var(--dim); }
    .cmd { color: var(--fg); }
    .out { color: var(--fg); margin: .15rem 0 1.1rem; }
    .out.dim { color: var(--dim); }

    .caret {
      display: inline-block; width: .55em; height: 1.05em;
      background: var(--accent); vertical-align: -2px; margin-left: 2px;
      animation: blink 1.1s steps(2) infinite;
    }
    @media (prefers-reduced-motion: reduce) { .caret { animation: none; } }

    .ls {
      display: grid; grid-template-columns: max-content max-content 1fr;
      gap: .15rem 1.1rem; margin: .25rem 0 1.1rem;
      font-size: 13px; align-items: baseline;
    }
    .ls .perm { color: var(--dim); }
    .ls .size { color: var(--dim); text-align: right; }
    .ls .name { color: var(--fg); }
    .ls .name.dir   { color: var(--blue);   font-weight: 500; }
    .ls .name.exe   { color: var(--accent); font-weight: 500; }
    .ls .name.link  { color: var(--mauve);  }
    .ls .name a.openpane {
      color: inherit; border-bottom: 0;
      text-decoration: underline; text-decoration-color: var(--dim2);
      text-underline-offset: 3px;
    }
    .ls .name a.openpane:hover {
      color: var(--accent); text-decoration-color: var(--accent);
    }
    @media (max-width: 480px) {
      .ls { grid-template-columns: max-content 1fr; gap: .15rem .7rem; }
      .ls .size { display: none; }
    }

    .cat { color: var(--fg); margin: .25rem 0 1.1rem; max-width: 60ch; }
    .cat .k { color: var(--accent); }

    .principles { list-style: none; padding: 0; margin: .25rem 0 1.1rem;
                  display: grid; gap: .15rem; color: var(--fg); }
    .principles li::before { content: "•  "; color: var(--accent); }

    /* fine-tuning table */
    .ft-table {
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 4px 14px; margin: .35rem 0 1rem;
      font-size: 12.5px; align-items: baseline;
    }
    .ft-table .h { color: var(--dim); border-bottom: 1px dashed var(--line2); padding-bottom: 4px; }
    .ft-table .name a { color: var(--blue); border-bottom: 1px dotted var(--dim2); }
    .ft-table .name a:hover { color: var(--accent); border-color: var(--accent); }
    .ft-table .fmt { color: var(--mauve); }
    .ft-table .dl  { color: var(--accent); text-align: right; }
    .ft-table .dl.loading { color: var(--dim); }
    @media (max-width: 480px) {
      .ft-table { grid-template-columns: 1fr auto; }
      .ft-table .fmt { display: none; }
    }

    .footer-line { color: var(--dim); margin-top: 1rem; font-size: 11.5px; }
    .footer-line a { color: var(--dim); }

    /* interactive shell input */
    .liveline { display: flex; align-items: baseline; gap: .35rem; margin: .2rem 0 0; }
    .liveline .ps1 { flex: 0 0 auto; }
    .shellinput {
      flex: 1; min-width: 0;
      background: transparent; border: 0; outline: 0;
      color: var(--fg); font-family: var(--mono); font-size: inherit;
      line-height: 1.55; padding: 0; margin: 0;
      caret-color: var(--accent);
    }
    .shellinput::placeholder { color: var(--dim2); }
    .out.err { color: var(--red); }

    .hint {
      color: var(--dim); font-size: 11.5px; margin-top: .8rem; padding-top: .8rem;
      border-top: 1px dashed var(--line2);
    }
    .hint .k { color: var(--yellow); }

    /* mobile: stack panes vertically, full width */
    @media (max-width: 700px) {
      .panes { flex-direction: column; overflow-x: hidden; overflow-y: auto; }
      .pane { flex: 0 0 auto; min-height: 70vh; width: 100%; border-right: 0; border-bottom: 1px solid var(--line); }
      .pane:last-child { border-bottom: 0; }
      @keyframes splitIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    }
  </style>
</head>

<script>
/* =========================================================================
   pane definitions — each one is a shell session that auto-types
   ========================================================================= */
const PROMPT = (cwd) => `<span class="ps1">
  <span class="u">fesal</span><span class="a">@</span><span class="h">fayed</span><span class="d">:</span><span class="c">${cwd}</span><span class="d">$</span>
</span>`;

/* helper: tag a name as a "openpane" link */
const openLink = (key, label) => `<a class="openpane" data-pane="${key}">${label}</a>`;

const PANES = {
  home: {
    title: "~",
    path: "~",
    steps: [
      { cwd: "~", cmd: "whoami",
        out: `<div class="out">Data &amp; ML Engineer<br/><span style="color:var(--dim)">B.S. Data Science &amp; Artificial Intelligence &mdash; Florida International University</span></div>` },
      { cwd: "~", cmd: "cat about.md",
        out: `<div class="cat">I build <span class="k">agents</span> and fine-tune <span class="k">models</span>. I spend most of my time engineering pipelines that turn siloed sources into structured signal you can actually do something with.</div>` },
      { cwd: "~", cmd: "cd projects/ && ls -la",
        cwdAfter: "~/projects",
        out: `<div class="ls">
          <span class="perm">drwx------</span><span class="size">stealth</span><span class="name dir">${openLink('viml','viml.ai/')}</span>
          <span class="perm">drwxr-xr-x</span><span class="size">personal</span><span class="name dir">${openLink('qs','qs/')}</span>
          <span class="perm">drwxr-xr-x</span><span class="size">infra</span><span class="name dir">${openLink('ambler','ambler/')}</span>
          <span class="perm">drwxr-xr-x</span><span class="size">meta</span><span class="name dir">${openLink('agentic','agentic-os/')}</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ml</span><span class="name dir">${openLink('finetuning','fine-tuning/')}</span>
        </div>
        <div class="out dim" style="margin-top:-.55rem;">
          # click any dir &rarr; opens in a new pane (tmux split-window -h)
        </div>` },
      { cwd: "~/projects", cmd: "cd .. && cat .principles",
        cwdAfter: "~",
        out: `<ul class="principles">
          <li>fix the root, not the symptom</li>
          <li>local default, cloud on demand</li>
          <li>agents type, humans steer</li>
          <li>one project, one repo, one job</li>
        </ul>` },
      { cwd: "~", cmd: "ls contact/",
        out: `<div class="ls">
          <span class="perm">-rw-r--r--</span><span class="size">mail</span><span class="name link"><a href="mailto:hi@fesalfayed.com">hi@fesalfayed.com</a></span>
          <span class="perm">lrwxr-xr-x</span><span class="size">git</span><span class="name link"><a href="https://github.com/fesalfayed" rel="me" target="_blank">github.com/fesalfayed</a></span>
          <span class="perm">lrwxr-xr-x</span><span class="size">hf</span><span class="name link"><a href="https://huggingface.co/fesalfayed" rel="me" target="_blank">huggingface.co/fesalfayed</a></span>
        </div>` },
    ],
    tail: `
      <p class="hint">
        <span class="k">type a command</span> below &mdash; try <span class="k">help</span> ·
        <span class="k">↑/↓</span> history · <span class="k">tab</span> complete ·
        <span class="k">esc</span> close pane · <span class="k">0-9</span> jump
      </p>
      <p class="footer-line"># &copy; <span class="y"></span> fesal fayed &middot; <a href="https://github.com/fesalfayed/fesalfayed-com" target="_blank">src</a></p>
    `
  },

  viml: {
    title: "viml.ai",
    path: "~/projects/viml.ai",
    steps: [
      { cwd: "~/projects/viml.ai", cmd: "cat README.md",
        out: `<div class="cat"><span class="k">viml.ai</span> &mdash; vertical intelligence layer. status: <span style="color:var(--yellow)">[stealth]</span>.</div>` },
      { cwd: "~/projects/viml.ai", cmd: "ls",
        out: `<div class="ls">
          <span class="perm">-rw-------</span><span class="size">readme</span><span class="name">README.md</span>
          <span class="perm">drwx------</span><span class="size">priv</span><span class="name dir">internal/</span>
        </div>` },
      { cwd: "~/projects/viml.ai", cmd: "echo \"more soon.\"",
        out: `<div class="out dim">more soon.</div>` },

  qs: {
    title: "qs",
    path: "~/projects/qs",
    steps: [
      { cwd: "~/projects/qs", cmd: "cat README.md",
        out: `<div class="cat">data pipelines for a fully <span class="k">quantified life</span>. pulls biometrics (ultrahuman), iOS context (location, screen time, messages, calendar, email), productivity (tasks done, active projects, scheduling cadence), training (hevy &mdash; sets, weights, exercises, gym days, session timing), nutrition (calories, macros, weight in kg), and mental health (self-coded nightly journal: PHQ-9 + other self-assessments) into one unified store.<br/><br/>all of it gets fed to <span class="k">ML</span>. the goal is to answer questions like <em style="color:var(--yellow)">"does a late saturday-night workout + heavy screen time cause low productivity tuesday morning?"</em> &mdash; stop guessing what the ideal routine is. the machine knows everything and tells me how present behavior shapes near-future outcomes.</div>` },
      { cwd: "~/projects/qs", cmd: "ls -la sources/",
        out: `<div class="ls">
          <span class="perm">drwxr-xr-x</span><span class="size">bio</span><span class="name dir">ultrahuman/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ios</span><span class="name dir">location/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ios</span><span class="name dir">screentime/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ios</span><span class="name dir">messages/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ios</span><span class="name dir">calendar/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">ios</span><span class="name dir">email/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">work</span><span class="name dir">productivity/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">train</span><span class="name dir">hevy/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">diet</span><span class="name dir">nutrition/</span>
          <span class="perm">drwxr-xr-x</span><span class="size">mind</span><span class="name dir">journal/</span>
        </div>` },
      { cwd: "~/projects/qs", cmd: "head -1 store/schema.sql && echo '...' && wc -l store/schema.sql",
        out: `<div class="out dim">-- unified time-series store: one row per (timestamp, signal, value)<br/>...<br/>~/projects/qs/store/schema.sql</div>` },
      { cwd: "~/projects/qs", cmd: "crontab -l | grep qs",

  ambler: {

    ]

      { cwd: "~/projects/agentic-os", cmd: "ls profiles/",

          <span class="perm">drwx------</span><span class="size">build</span><span class="name dir">operator_a/</span>
          <span class="perm">drwx------</span><span class="size">build</span><span class="name dir">operator_dev/</span>

      { cwd: "~/projects/fine-tuning", cmd: "ls collection/",
        out: `<div class="ls">
          <span class="perm">lrwxr-xr-x</span><span class="size">hf</span><span class="name link"><a href="https://huggingface.co/collections/fesalfayed/finetuned-hermes-function-calling-v1" target="_blank">finetuned-hermes-function-calling-v1 &rarr;</a></span>
        </div>` },
      { cwd: "~/projects/fine-tuning", cmd: "curl -s hf.co/api/models?author=fesalfayed | jq -r '.[] | \"\\(.id) \\(.downloads)\"'",
        out: `<div class="ft-table" id="ft-table">
          <span class="h">model</span><span class="h">format</span><span class="h">downloads</span>
          <span class="name"><a href="https://huggingface.co/fesalfayed/gpt-oss-20b-hermes_agent-tool-finetune_mlx" target="_blank">gpt-oss-20b-hermes_agent-tool-finetune_mlx</a></span>
            <span class="fmt">mlx</span>
            <span class="dl loading" data-model="gpt-oss-20b-hermes_agent-tool-finetune_mlx">…</span>
          <span class="name"><a href="https://huggingface.co/fesalfayed/gpt-oss-20b-hermes_agent-tool-finetune_gguf" target="_blank">gpt-oss-20b-hermes_agent-tool-finetune_gguf</a></span>
            <span class="fmt">gguf</span>
            <span class="dl loading" data-model="gpt-oss-20b-hermes_agent-tool-finetune_gguf">…</span>
          <span class="name"><a href="https://huggingface.co/fesalfayed/gpt-oss-20b-hermes_agent-tool-finetune_4bit" target="_blank">gpt-oss-20b-hermes_agent-tool-finetune_4bit</a></span>

/* =========================================================================
   typing engine (kept from prior version, simplified)
   ========================================================================= */
const prefersReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const sleep = ms => new Promise(r => setTimeout(r, ms));

function makeCaret() {
  const c = document.createElement('span');
  c.className = 'caret'; c.setAttribute('aria-hidden','true');
  return c;
}

async function typeInto(el, text, perChar = 16) {
  if (prefersReduced) { el.textContent = text; return; }
  el.textContent = '';
  const caret = makeCaret();
  el.after(caret);
  for (let i = 1; i <= text.length; i++) {
    el.textContent = text.slice(0, i);
    const ch = text[i-1];
    let d = (ch === ' ') ? 10 : /[.,/\-_:;]/.test(ch) ? 22 : perChar + Math.random()*16;
    await sleep(d);
  }
  caret.remove();
}

/* run one pane's shell session */
async function runPane(paneEl, def) {
  const body = paneEl.querySelector('.pane__body');
  body.innerHTML = '';

  for (const step of def.steps) {
    // prompt + (to-be-typed) cmd
    const lineP = document.createElement('p');
    lineP.className = 'line';
    lineP.innerHTML = `${PROMPT(step.cwd)} <span class="cmd"></span>`;
    body.appendChild(lineP);
    body.scrollTop = body.scrollHeight;

    const cmdSpan = lineP.querySelector('.cmd');
    await typeInto(cmdSpan, step.cmd, 14);
    await sleep(prefersReduced ? 0 : 140);

    // optional new cwd prompt line (cd shows the next prompt)
    if (step.cwdAfter) {
      const cwdP = document.createElement('p');
      cwdP.className = 'line';
      cwdP.innerHTML = PROMPT(step.cwdAfter);
      body.appendChild(cwdP);
    }

    // output
    if (step.out) {
      const wrap = document.createElement('div');
      wrap.innerHTML = step.out;
      while (wrap.firstChild) body.appendChild(wrap.firstChild);
      body.scrollTop = body.scrollHeight;
      await sleep(prefersReduced ? 0 : 90);
    }
  }

  // tail (footer/hints) for the home pane
  if (def.tail) {
    const wrap = document.createElement('div');
    wrap.innerHTML = def.tail;
    while (wrap.firstChild) body.appendChild(wrap.firstChild);
    body.querySelectorAll('.y').forEach(y => y.textContent = new Date().getFullYear());
  }

  // persistent live prompt at the bottom — interactive REPL
  const cwd = def.steps[def.steps.length-1].cwdAfter || def.steps[def.steps.length-1].cwd;
  mountShell(body, paneEl, cwd);

  if (def.after) try { await def.after(paneEl); } catch {}
}

function loadHistory() {
  try {

function demoteToFesal(ctx) {

function printOut(ctx, html) {
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  // insert before the liveline so output stays above the prompt
  const live = ctx.paneEl.querySelector('.liveline');
  while (wrap.firstChild) live.parentNode.insertBefore(wrap.firstChild, live);
  ctx.paneEl.querySelector('.pane__body').scrollTop = ctx.paneEl.querySelector('.pane__body').scrollHeight;
}

function executeCommand(raw, ctx) {
  const cmd = raw.trim();
  if (!cmd) return;

  const isRoot = ctx.paneEl.dataset.root === '1';
  const PR = isRoot ? PROMPT_ROOT : PROMPT;

  // echo the typed command above as a frozen line (using current prompt)
  const frozen = document.createElement('p');
  frozen.className = 'line';
  frozen.innerHTML = `${PR(ctx.cwd)} <span class="cmd">${escapeHTML(cmd)}</span>`;
  const live = ctx.paneEl.querySelector('.liveline');
  live.parentNode.insertBefore(frozen, live);

  // record history (don't pollute with the fake root demo, but keep it useful)
  const hist = loadHistory();
  if (hist[hist.length-1] !== cmd) { hist.push(cmd); saveHistory(hist); }

  // ─── root mode dispatch ──────────────────────────────────────────────
  if (isRoot) {
    if (ROOT_COMMANDS[cmd]) return ROOT_COMMANDS[cmd].run(ctx);
    const [rhead, ...rrest] = cmd.split(/\s+/);
    if (ROOT_COMMANDS[rhead]) return ROOT_COMMANDS[rhead].run({ ...ctx, args: rrest });
    // fall through to normal dispatch for shared commands (ls, pwd, etc.)
  }

  // dispatch — exact-match multi-word first, then first-token
  if (COMMANDS[cmd]) { COMMANDS[cmd].run(ctx); return; }
  const [head, ...rest] = cmd.split(/\s+/);
  const arg = rest.join(' ');

  if (head === 'open' || head === 'cd') return runOpen(ctx, arg);
  if (head === 'cat') {
    if (rest[0] === 'about.md') return COMMANDS['cat about.md'].run(ctx);
    if (rest[0] === '.principles') return COMMANDS['cat .principles'].run(ctx);
    return printOut(ctx, `<div class="out err">cat: ${escapeHTML(rest[0]||'')}: No such file</div>`);
  }
  if (head === 'echo') return printOut(ctx, `<div class="out">${escapeHTML(arg)}</div>`);
  if (COMMANDS[head]) return COMMANDS[head].run({ ...ctx, args: rest });

  // shortcuts that match a project name directly
  if (['viml','viml.ai','qs','ambler','agentic','agentic-os','finetuning','fine-tuning'].includes(head.toLowerCase())) {
    return runOpen(ctx, head);
  }

  printOut(ctx, `<div class="out err">${escapeHTML(head)}: command not found. type <span style="color:var(--blue)">help</span></div>`);
}

function mountShell(body, paneEl, cwd) {
  const paneKey = paneEl.dataset.key;
  const isRoot = paneEl.dataset.root === '1';
  const PR = isRoot ? PROMPT_ROOT : PROMPT;
  const line = document.createElement('p');
  line.className = 'line liveline';
  const caretColor = isRoot ? 'style="caret-color:#ff6b6b"' : '';
  line.innerHTML = `${PR(cwd)} <input class="shellinput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${isRoot ? 'root: type exit to logout' : 'type help'}" aria-label="shell input" ${caretColor} />`;
  body.appendChild(line);

  const input = line.querySelector('.shellinput');
  const ctx = { paneEl, paneKey, cwd, input };

  // per-pane history cursor
  let cursor = null; // null = past-the-end (current draft)
  let draft = '';

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const raw = input.value;
      input.value = '';
      cursor = null; draft = '';
      executeCommand(raw, ctx);
      // re-focus & scroll
      requestAnimationFrame(() => { input.focus(); body.scrollTop = body.scrollHeight; });
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      const h = loadHistory();
      if (!h.length) return;
      if (cursor === null) { draft = input.value; cursor = h.length - 1; }
      else if (cursor > 0) cursor--;
      input.value = h[cursor];
      // move caret to end
      requestAnimationFrame(() => input.setSelectionRange(input.value.length, input.value.length));
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      const h = loadHistory();
      if (cursor === null) return;
      if (cursor < h.length - 1) { cursor++; input.value = h[cursor]; }
      else { cursor = null; input.value = draft; }
      requestAnimationFrame(() => input.setSelectionRange(input.value.length, input.value.length));
      e.preventDefault();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const prefix = input.value;
      if (!prefix) return;
      const pool = Object.keys(COMMANDS).concat(['open','cd','echo','viml','qs','ambler','agentic','finetuning','cat about.md','cat .principles']);
      const matches = [...new Set(pool.filter(c => c.startsWith(prefix)))];
      if (matches.length === 1) input.value = matches[0];
      else if (matches.length > 1) printOut(ctx, `<div class="out dim">${matches.join('   ')}</div>`);
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
      e.preventDefault();
      COMMANDS.clear.run(ctx);
    } else if (e.key === 'Escape') {
      // let global handler close pane
    }
    setActive(paneKey);
  });

  // clicking anywhere in the pane focuses input
  paneEl.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    if (e.target.tagName !== 'INPUT') {
      // tiny delay so text selection still works
      setTimeout(() => { if (!window.getSelection().toString()) input.focus(); }, 0);
    }
  });

  // autofocus if this pane is (or becomes) active
  setTimeout(() => input.focus(), 30);
}

/* =========================================================================
   pane manager
   ========================================================================= */
const panesEl = document.getElementById('panes');
const tabsEl  = document.getElementById('tabs');
const openOrder = []; // keys in render order
let paneSeq = 0;

function buildPane(key) {
  const def = PANES[key];
  if (!def) return null;
  const id = paneSeq++;
  const el = document.createElement('section');
  el.className = 'pane';
  el.dataset.key = key;
  el.dataset.paneId = id;
  el.innerHTML = `
    <div class="pane__bar">
      <div><span class="pane__id">[${id}]</span><span class="pane__path">${def.path}</span></div>
      ${key === 'home' ? '' : '<a class="pane__close" title="close pane (esc)">×</a>'}
    </div>
    <div class="pane__body"></div>
  `;
  if (key !== 'home') {
    el.querySelector('.pane__close').addEventListener('click', e => { e.preventDefault(); closePane(key); });
  }
  el.querySelector('.pane__body').addEventListener('click', () => setActive(key));
  return el;
}

function setActive(key) {
  panesEl.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.dataset.key === key));
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
}

function rebuildTabs() {
  tabsEl.innerHTML = openOrder.map((k, i) =>
    `<div class="tab" data-key="${k}"><span class="i">${i}:</span>${PANES[k].title}</div>`
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      setActive(t.dataset.key);
      const target = panesEl.querySelector(`.pane[data-key="${t.dataset.key}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    });
  });
  // single pane = fullscreen; >1 panes = tmux split
  panesEl.classList.toggle('split', openOrder.length > 1);
}

async function openPane(key) {
  if (!PANES[key]) return;
  if (openOrder.includes(key)) {
    setActive(key);
    const t = panesEl.querySelector(`.pane[data-key="${key}"]`);
    if (t) t.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    return;
  }
  const el = buildPane(key);
  panesEl.appendChild(el);
  openOrder.push(key);
  rebuildTabs();
  setActive(key);
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' }), 40);
  await runPane(el, PANES[key]);
}

function closePane(key) {
  if (key === 'home') return;
  const el = panesEl.querySelector(`.pane[data-key="${key}"]`);
  if (el) el.remove();
  const idx = openOrder.indexOf(key);
  if (idx >= 0) openOrder.splice(idx, 1);
  rebuildTabs();
  setActive(openOrder[openOrder.length-1] || 'home');
}

/* delegated clicks: any [data-pane] anywhere opens a pane */
document.addEventListener('click', e => {
  const link = e.target.closest('[data-pane]');
  if (!link) return;
  e.preventDefault();
  openPane(link.dataset.pane);
});

/* keyboard: esc closes active, 0-9 jumps (but not while typing in input) */
document.addEventListener('keydown', e => {
  const inInput = document.activeElement && document.activeElement.tagName === 'INPUT';
  if (e.key === 'Escape') {
    if (inInput) document.activeElement.blur();
    const active = panesEl.querySelector('.pane.active');
    if (active && active.dataset.key !== 'home' && !inInput) closePane(active.dataset.key);
  } else if (/^[0-9]$/.test(e.key) && !e.metaKey && !e.ctrlKey && !e.altKey && !inInput) {
    const i = parseInt(e.key, 10);
    if (openOrder[i]) {
      setActive(openOrder[i]);
      const t = panesEl.querySelector(`.pane[data-key="${openOrder[i]}"]`);
      if (t) { t.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
               const inp = t.querySelector('.shellinput'); if (inp) inp.focus(); }
    }
  }
});

/* clock */
function tick() {
  const d = new Date();
  document.getElementById('clk').textContent =
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
tick(); setInterval(tick, 30_000);

/* boot */
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => openPane('home'), 180);
});
</script>

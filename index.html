/* =========================================================================
   typing engine (kept from prior version, simplified)
   ========================================================================= */
const prefersReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const sleep = ms => new Promise(r => setTimeout(r, ms));

function makeCaret() {
  const c = document.createElement('span');
  c.className = 'caret'; c.setAttribute('aria-hidden','true');
  return c;
}

async function typeInto(el, text, perChar = 16) {
  if (prefersReduced) { el.textContent = text; return; }
  el.textContent = '';
  const caret = makeCaret();
  el.after(caret);
  for (let i = 1; i <= text.length; i++) {
    el.textContent = text.slice(0, i);
    const ch = text[i-1];
    let d = (ch === ' ') ? 10 : /[.,/\-_:;]/.test(ch) ? 22 : perChar + Math.random()*16;
    await sleep(d);
  }
  caret.remove();
}

/* run one pane's shell session */
async function runPane(paneEl, def) {
  const body = paneEl.querySelector('.pane__body');
  body.innerHTML = '';

  for (const step of def.steps) {
    // prompt + (to-be-typed) cmd
    const lineP = document.createElement('p');
    lineP.className = 'line';
    lineP.innerHTML = `${PROMPT(step.cwd)} <span class="cmd"></span>`;
    body.appendChild(lineP);
    body.scrollTop = body.scrollHeight;

    const cmdSpan = lineP.querySelector('.cmd');
    await typeInto(cmdSpan, step.cmd, 14);
    await sleep(prefersReduced ? 0 : 140);

    // optional new cwd prompt line (cd shows the next prompt)
    if (step.cwdAfter) {
      const cwdP = document.createElement('p');
      cwdP.className = 'line';
      cwdP.innerHTML = PROMPT(step.cwdAfter);
      body.appendChild(cwdP);
    }

    // output
    if (step.out) {
      const wrap = document.createElement('div');
      wrap.innerHTML = step.out;
      while (wrap.firstChild) body.appendChild(wrap.firstChild);
      body.scrollTop = body.scrollHeight;
      await sleep(prefersReduced ? 0 : 90);
    }
  }

  // tail (footer/hints) for the home pane
  if (def.tail) {
    const wrap = document.createElement('div');
    wrap.innerHTML = def.tail;
    while (wrap.firstChild) body.appendChild(wrap.firstChild);
    body.querySelectorAll('.y').forEach(y => y.textContent = new Date().getFullYear());
  }

  // persistent live prompt at the bottom
  const live = document.createElement('p');
  live.className = 'line';
  live.innerHTML = `${PROMPT(def.steps[def.steps.length-1].cwdAfter || def.steps[def.steps.length-1].cwd)} `;
  const caret = makeCaret();
  live.appendChild(caret);
  body.appendChild(live);
  body.scrollTop = body.scrollHeight;

  if (def.after) try { await def.after(paneEl); } catch {}
}

/* =========================================================================
   pane manager
   ========================================================================= */
const panesEl = document.getElementById('panes');
const tabsEl  = document.getElementById('tabs');
const openOrder = []; // keys in render order
let paneSeq = 0;

function buildPane(key) {
  const def = PANES[key];
  if (!def) return null;
  const id = paneSeq++;
  const el = document.createElement('section');
  el.className = 'pane';
  el.dataset.key = key;
  el.dataset.paneId = id;
  el.innerHTML = `
    <div class="pane__bar">
      <div><span class="pane__id">[${id}]</span><span class="pane__path">${def.path}</span></div>
      ${key === 'home' ? '' : '<a class="pane__close" title="close pane (esc)">×</a>'}
    </div>
    <div class="pane__body"></div>
  `;
  if (key !== 'home') {
    el.querySelector('.pane__close').addEventListener('click', e => { e.preventDefault(); closePane(key); });
  }
  el.querySelector('.pane__body').addEventListener('click', () => setActive(key));
  return el;
}

function setActive(key) {
  panesEl.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.dataset.key === key));
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
}

function rebuildTabs() {
  tabsEl.innerHTML = openOrder.map((k, i) =>
    `<div class="tab" data-key="${k}"><span class="i">${i}:</span>${PANES[k].title}</div>`
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      setActive(t.dataset.key);
      const target = panesEl.querySelector(`.pane[data-key="${t.dataset.key}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    });
  });
}

async function openPane(key) {
  if (!PANES[key]) return;
  if (openOrder.includes(key)) {
    setActive(key);
    const t = panesEl.querySelector(`.pane[data-key="${key}"]`);
    if (t) t.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    return;
  }
  const el = buildPane(key);
  panesEl.appendChild(el);
  openOrder.push(key);
  rebuildTabs();
  setActive(key);
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' }), 40);
  await runPane(el, PANES[key]);
}

function closePane(key) {
  if (key === 'home') return;
  const el = panesEl.querySelector(`.pane[data-key="${key}"]`);
  if (el) el.remove();
  const idx = openOrder.indexOf(key);
  if (idx >= 0) openOrder.splice(idx, 1);
  rebuildTabs();
  setActive(openOrder[openOrder.length-1] || 'home');
}

/* delegated clicks: any [data-pane] anywhere opens a pane */
document.addEventListener('click', e => {
  const link = e.target.closest('[data-pane]');
  if (!link) return;
  e.preventDefault();
  openPane(link.dataset.pane);
});

/* keyboard: esc closes active, 0-9 jumps */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const active = panesEl.querySelector('.pane.active');
    if (active && active.dataset.key !== 'home') closePane(active.dataset.key);
  } else if (/^[0-9]$/.test(e.key) && !e.metaKey && !e.ctrlKey && !e.altKey && document.activeElement.tagName !== 'INPUT') {
    const i = parseInt(e.key, 10);
    if (openOrder[i]) {
      setActive(openOrder[i]);
      const t = panesEl.querySelector(`.pane[data-key="${openOrder[i]}"]`);
      if (t) t.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    }
  }
});

/* clock */
function tick() {
  const d = new Date();
  document.getElementById('clk').textContent =
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
tick(); setInterval(tick, 30_000);

/* boot */
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => openPane('home'), 180);
});
</script>
